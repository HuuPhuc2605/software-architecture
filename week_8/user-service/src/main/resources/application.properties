spring.application.name=user-service
server.port=8081

# === MySQL (XAMPP) - LAN configuration ===
# Update `spring.datasource.username` and `spring.datasource.password` to match your XAMPP MySQL credentials.
spring.datasource.url=jdbc:mysql://192.168.1.3:3306/userdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=phuc
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update

# Ensure Hibernate knows which SQL dialect to use (prevents "Unable to determine Dialect" errors)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Also provide Jakarta persistence JDBC url (some Hibernate versions require this)
jakarta.persistence.jdbc.url=${spring.datasource.url}

# JWT secret (change in production)
jwt.secret=oTRLZy9rkxQsNPtcJ/YjI1i4ZxZeF5hALikD0dd7JN4=

