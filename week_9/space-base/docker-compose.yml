services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  product-service:
    build:
      context: ./pu1-product-service
    environment:
      REDIS_HOST: redis
    ports:
      - "8081:8081"
    depends_on:
      - redis

  cart-service:
    build:
      context: ./pu2-cart-service
    environment:
      REDIS_HOST: redis
    ports:
      - "8082:8082"
    depends_on:
      - redis

  order-service:
    build:
      context: ./pu3-order-service
    environment:
      REDIS_HOST: redis
      INVENTORY_BASE_URL: http://inventory-service:8084
    ports:
      - "8083:8083"
    depends_on:
      - redis
      - inventory-service

  inventory-service:
    build:
      context: ./pu4-inventory-service
    environment:
      REDIS_HOST: redis
    ports:
      - "8084:8084"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - product-service
      - cart-service
      - order-service
      - inventory-service
